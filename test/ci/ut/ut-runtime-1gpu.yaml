api_version: ci.tokenspeed.io/v1
name: ut-runtime-1gpu
type: ut
triggers:
  - per-commit
  - manual
runner:
  labels:
    - h100-1gpu
    - b200-1gpu
    - gb200-1gpu
    - amd-mi35x-1gpu-test
  env:
    amd-mi35x-1gpu-test:
      CI_TIMEOUT_PER_FILE: "600"
env:
  CI: "true"
install:
  - bash test/ci_system/install_deps.sh
ut:
  commands:
    - python3 test/runtime/run_ci_suite.py --device cuda --suite runtime-1gpu --timeout-per-file ${CI_TIMEOUT_PER_FILE:-1800}
    - python3 -m pytest test/cli -v
report:
  github_step_summary: true
